<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>AI Ultra Elite</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600&display=swap" rel="stylesheet">

<style>
:root{
--primary:#4cc9f0;
--bg1:#020617;
--bg2:#0f172a;
--glass:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.1);
}

body{
font-family:"Inter";
margin:0;
color:white;
overflow:hidden;
background:linear-gradient(-45deg,#020617,#0f172a,#020617,#1e293b);
background-size:400% 400%;
animation:bg 15s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* SIDEBAR */
.sidebar{
width:260px;
height:100vh;
position:fixed;
background:var(--glass);
backdrop-filter:blur(25px);
border-right:1px solid var(--border);
padding:25px;
}

.logo{
color:var(--primary);
font-size:22px;
text-shadow:0 0 20px rgba(76,201,240,.7);
}

.menu a{
display:block;
padding:12px;
border-radius:12px;
color:#94a3b8;
margin-bottom:8px;
transition:.25s;
text-decoration:none;
}

.menu a:hover{
color:white;
transform:translateX(6px);
box-shadow:0 0 20px rgba(76,201,240,.3);
}

/* MAIN */
.main{
margin-left:260px;
height:100vh;
display:flex;
flex-direction:column;
}

/* CHAT */
.chat{
flex:1;
overflow-y:auto;
padding:30px 20px 160px;
max-width:900px;
margin:auto;
width:100%;
}

/* MESSAGE */
.msg{
display:flex;
margin-bottom:20px;
animation:fade .3s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px)
}
}

.bubble{
padding:14px;
border-radius:14px;
max-width:70%;
line-height:1.6;
word-wrap:break-word;
white-space:pre-wrap;
}

/* USER */
.user .bubble{
margin-left:auto;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
box-shadow:0 0 20px rgba(37,99,235,.4);
}

/* BOT */
.bot .bubble{
background:var(--glass);
border:1px solid var(--border);
backdrop-filter:blur(10px);
}

/* IMMAGINI AI */
.ai-image{
max-width:320px;
border-radius:14px;
margin-top:10px;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

/* VIDEO */
.ai-video{
max-width:320px;
border-radius:14px;
margin-top:10px;
}

/* INPUT */
.input-wrapper{
position:fixed;
bottom:0;
left:260px;
width:calc(100% - 260px);
padding:20px;
background:linear-gradient(to top,#020617,transparent);
}

.input-box{
max-width:900px;
margin:auto;
display:flex;
gap:10px;
background:var(--glass);
border:1px solid var(--border);
border-radius:25px;
padding:10px;
transition:.2s;
}

.input-box:focus-within{
box-shadow:0 0 30px rgba(76,201,240,.4);
}

input{
flex:1;
background:transparent;
border:none;
color:white;
outline:none;
font-size:15px;
}

button{
border:none;
cursor:pointer;
padding:10px;
border-radius:12px;
transition:.2s;
background:#1e293b;
color:white;
}

.send{
background:var(--primary);
color:black;
font-weight:bold;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px rgba(255,255,255,.3);
}

.preview{
position:fixed;
bottom:110px;
left:50%;
transform:translateX(-50%);
display:none;
background:#000;
padding:10px;
border-radius:12px;
z-index:999;
}

.loader{
display:none;
text-align:center;
color:#aaa;
margin-bottom:10px;
}

.recording{
box-shadow:0 0 20px red !important;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">AI Ultra</div>

<div class="menu">
<a>💬 Chat</a>
<a>🖼️ AI Images</a>
<a>🎬 AI Video</a>
<a>💎 Upgrade</a>
<a href="/logout">🚪 Logout</a>
</div>

<div style="font-size:12px;color:#64748b;margin-top:20px;">
{{ user.plan }} • {{ user.messages }}
</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="chat" id="chat"></div>

<div class="loader" id="loader">
AI sta pensando...
</div>

<div class="input-wrapper">

<div class="input-box">

<input id="input" placeholder="Scrivi qualcosa..." autocomplete="off">

<input type="file" id="file" hidden>

<button onclick="document.getElementById('file').click()">📷</button>

<button id="micBtn" onclick="toggleMic()">🎤</button>

<button class="send" onclick="send()">➤</button>

</div>

</div>

</div>

<!-- PREVIEW -->
<div class="preview" id="preview">
<img id="previewImg" height="60">
<button onclick="removeImage()">✖</button>
</div>

<script>

let selectedImage = null;

/* ---------------- ADD MESSAGE ---------------- */

function add(role,text,isImage=false,isVideo=false){

let div = document.createElement("div");

div.className = "msg " + role;

if(isImage){

div.innerHTML = `
<div class="bubble">
<img src="${text}" class="ai-image">
</div>
`;

}else if(isVideo){

div.innerHTML = `
<div class="bubble">
<video controls class="ai-video">
<source src="${text}">
</video>
</div>
`;

}else{

div.innerHTML = `<div class="bubble"></div>`;

}

chat.appendChild(div);

if(!isImage && !isVideo){
type(div.querySelector(".bubble"),text);
}

chat.scrollTop = chat.scrollHeight;

}

/* ---------------- TYPE EFFECT ---------------- */

function type(el,text){

let i = 0;

function t(){

if(i < text.length){

el.innerHTML += text[i++];

chat.scrollTop = chat.scrollHeight;

setTimeout(t,10);

}

}

t();

}

/* ---------------- SEND ---------------- */

async function send(){

let text = input.value.trim();

if(!text && !selectedImage) return;

add("user",text);

let form = new FormData();

form.append("prompt",text);

if(selectedImage){
form.append("image",selectedImage);
}

input.value = "";

loader.style.display = "block";

try{

let res = await fetch("/chat",{
method:"POST",
body:form
});

let data = await res.json();

loader.style.display = "none";

/* 🔥 IMMAGINE AI */
if(data.image){

add("bot",data.image,true);

/* 🎬 VIDEO AI */
}else if(data.video){

add("bot",data.video,false,true);

/* 💬 TESTO */
}else{

add("bot",data.response);

}

}catch(e){

loader.style.display = "none";

add("bot","⚠️ Errore server");

}

removeImage();

}

/* ---------------- ENTER ---------------- */

input.addEventListener("keypress",e=>{

if(e.key === "Enter"){
send();
}

});

/* ---------------- IMAGE UPLOAD ---------------- */

file.onchange = ()=>{

selectedImage = file.files[0];

preview.style.display = "block";

previewImg.src = URL.createObjectURL(selectedImage);

};

function removeImage(){

selectedImage = null;

preview.style.display = "none";

}

/* ---------------- VOICE ---------------- */

let rec;
let recording = false;

function toggleMic(){

if(!('webkitSpeechRecognition' in window)){

alert("Usa Chrome");

return;

}

if(!recording){

rec = new webkitSpeechRecognition();

rec.lang = "it-IT";

rec.onstart = ()=>{

recording = true;

micBtn.classList.add("recording");

};

rec.onresult = e=>{

input.value = e.results[0][0].transcript;

};

rec.onend = ()=>{

recording = false;

micBtn.classList.remove("recording");

};

rec.start();

}else{

rec.stop();

}

}

</script>

</body>
</html>
