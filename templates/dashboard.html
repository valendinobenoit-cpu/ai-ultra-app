<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Ultra Elite</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600&display=swap" rel="stylesheet">

<style>
:root{
--primary:#4cc9f0;
--bg:#020617;
--bg2:#0f172a;
--glass:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.1);
}

/* RESET */
*{box-sizing:border-box;margin:0;padding:0}

/* BODY */
body{
font-family:"Inter";
background:linear-gradient(-45deg,#020617,#0f172a,#020617,#1e293b);
background-size:400% 400%;
animation:bg 15s ease infinite;
color:white;
height:100vh;
display:flex;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* SIDEBAR */
.sidebar{
width:260px;
background:var(--glass);
backdrop-filter:blur(20px);
border-right:1px solid var(--border);
padding:20px;
display:flex;
flex-direction:column;
gap:20px;
}

.logo{
color:var(--primary);
font-size:20px;
font-weight:600;
}

.menu a{
display:block;
padding:10px;
border-radius:10px;
color:#94a3b8;
transition:.2s;
}

.menu a:hover{
background:rgba(255,255,255,0.05);
color:white;
transform:translateX(5px);
}

/* MAIN */
.main{
flex:1;
display:flex;
flex-direction:column;
height:100vh;
}

/* CHAT */
.chat{
flex:1;
overflow-y:auto;
padding:20px;
max-width:900px;
width:100%;
margin:auto;
}

/* MSG */
.msg{
margin-bottom:15px;
display:flex;
}

.bubble{
padding:14px;
border-radius:14px;
max-width:80%;
line-height:1.5;
animation:fade .3s;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
}

/* USER */
.user{justify-content:flex-end;}
.user .bubble{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
}

/* BOT */
.bot .bubble{
background:var(--glass);
border:1px solid var(--border);
}

/* INPUT */
.input-wrapper{
padding:15px;
background:linear-gradient(to top,#020617,transparent);
}

.input-box{
display:flex;
gap:10px;
max-width:900px;
margin:auto;
background:var(--glass);
border:1px solid var(--border);
border-radius:20px;
padding:10px;
}

input{
flex:1;
background:none;
border:none;
color:white;
outline:none;
font-size:16px;
}

/* BUTTON */
button{
border:none;
padding:10px;
border-radius:10px;
cursor:pointer;
background:rgba(255,255,255,0.05);
color:white;
}

.send{
background:var(--primary);
color:black;
font-weight:bold;
}

button:hover{
transform:scale(1.1);
}

/* LOADER */
.loader{
text-align:center;
color:#aaa;
margin-bottom:10px;
display:none;
}

/* MOBILE */
@media(max-width:768px){

.sidebar{
position:fixed;
left:-260px;
top:0;
height:100%;
z-index:10;
transition:.3s;
}

.sidebar.active{
left:0;
}

.main{
width:100%;
}

.menu-btn{
position:fixed;
top:10px;
left:10px;
z-index:20;
background:var(--glass);
padding:10px;
border-radius:10px;
}
}

/* MIC */
.recording{
box-shadow:0 0 20px red !important;
}

/* IMAGE PREVIEW */
#preview {
    max-width: 900px;
    margin: 10px auto;
    display: none;
}

#preview img {
    max-width: 200px;
    border-radius: 10px;
    border: 1px solid var(--border);
    display: block;
}
</style>
</head>

<body>

<!-- MENU MOBILE -->
<button class="menu-btn" onclick="toggleMenu()">☰</button>

<div class="sidebar" id="sidebar">
<div class="logo">AI Ultra</div>

<div class="menu">
<a>💬 Chat</a>
<a>💎 Upgrade</a>
<a href="/logout">🚪 Logout</a>
</div>

<div style="font-size:12px;color:#64748b;">
{{ user.plan }} • {{ user.messages }}
</div>
</div>

<div class="main">

<div class="chat" id="chat"></div>

<!-- IMAGE PREVIEW -->
<div id="preview"></div>

<div class="loader" id="loader">AI sta pensando...</div>

<div class="input-wrapper">
<div class="input-box">
<input id="input" placeholder="Scrivi..." autocomplete="off">

<button onclick="file.click()">📷</button>
<input type="file" id="file" hidden>

<button id="micBtn" onclick="toggleMic()">🎤</button>
<button class="send" onclick="send()">➤</button>
</div>
</div>

</div>

<script>
let selectedImage=null;

/* MENU MOBILE */
function toggleMenu(){
sidebar.classList.toggle("active");
}

/* MESSAGE */
function add(role,text){
let div=document.createElement("div");
div.className="msg "+role;
div.innerHTML=`<div class="bubble"></div>`;
chat.appendChild(div);
type(div.querySelector(".bubble"),text);
chat.scrollTop=chat.scrollHeight;
}

/* TYPING */
function type(el,text){
let i=0;
function t(){
if(i<text.length){
el.innerHTML+=text[i++];
setTimeout(t,8);
}
}
t();
}

/* IMAGE PREVIEW */
file.onchange = () => {
    const f = file.files[0];
    if (!f) return;

    selectedImage = f;

    const reader = new FileReader();
    reader.onload = e => {
        preview.innerHTML = `<img src="${e.target.result}">`;
        preview.style.display = "block";
    };
    reader.readAsDataURL(f);
};

/* SEND */
async function send(){
let text=input.value.trim();
if(!text && !selectedImage) return;

add("user",text || "[Immagine]");

let form=new FormData();
form.append("prompt",text);

if(selectedImage){
form.append("image",selectedImage);
preview.style.display="none";
preview.innerHTML="";
selectedImage=null;
file.value="";
}

input.value="";
loader.style.display="block";

let res=await fetch("/chat",{method:"POST",body:form});
let data=await res.json();

loader.style.display="none";
add("bot",data.response);
}

/* ENTER */
input.addEventListener("keypress",e=>{
if(e.key==="Enter") send();
});

/* VOICE */
let rec;
let recording=false;

function toggleMic(){

if(!('webkitSpeechRecognition' in window)){
alert("Usa Chrome");
return;
}

if(!recording){
rec=new webkitSpeechRecognition();
rec.lang="it-IT";

rec.onstart=()=>{
recording=true;
micBtn.classList.add("recording");
};

rec.onresult=e=>{
input.value=e.results[0][0].transcript;
};

rec.onend=()=>{
recording=false;
micBtn.classList.remove("recording");
};

rec.start();
}else{
rec.stop();
}
}
</script>

</body>
</html>
