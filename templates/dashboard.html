
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>AI Ultra Elite</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600&display=swap" rel="stylesheet">

<style>
:root{
--primary:#4cc9f0;
--bg1:#020617;
--bg2:#0f172a;
--glass:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.1);
}

/* BACKGROUND ANIMATO */
body{
font-family:"Inter";
margin:0;
color:white;
overflow:hidden;
background:linear-gradient(-45deg,#020617,#0f172a,#020617,#1e293b);
background-size:400% 400%;
animation:bg 15s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* SIDEBAR */
.sidebar{
width:260px;
height:100vh;
position:fixed;
background:var(--glass);
backdrop-filter:blur(25px);
border-right:1px solid var(--border);
padding:25px;
}

.logo{
color:var(--primary);
font-size:22px;
text-shadow:0 0 20px rgba(76,201,240,.7);
}

/* MENU */
.menu a{
display:block;
padding:12px;
border-radius:12px;
color:#94a3b8;
margin-bottom:8px;
transition:.25s;
}

.menu a:hover{
color:white;
transform:translateX(6px);
box-shadow:0 0 20px rgba(76,201,240,.3);
}

/* MAIN */
.main{
margin-left:260px;
height:100vh;
display:flex;
flex-direction:column;
}

/* CHAT */
.chat{
flex:1;
overflow-y:auto;
padding:30px 20px 160px;
max-width:900px;
margin:auto;
}

/* MSG */
.msg{
display:flex;
margin-bottom:20px;
animation:fade .3s;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
}

.bubble{
padding:14px;
border-radius:14px;
max-width:70%;
line-height:1.6;
}

/* USER */
.user .bubble{
margin-left:auto;
background:linear-gradient(135deg,#2563eb,#1d4ed8);
box-shadow:0 0 20px rgba(37,99,235,.4);
}

/* BOT */
.bot .bubble{
background:var(--glass);
border:1px solid var(--border);
backdrop-filter:blur(10px);
}

/* INPUT */
.input-wrapper{
position:fixed;
bottom:0;
left:260px;
width:calc(100% - 260px);
padding:20px;
background:linear-gradient(to top,#020617,transparent);
}

.input-box{
max-width:900px;
margin:auto;
display:flex;
gap:10px;
background:var(--glass);
border:1px solid var(--border);
border-radius:25px;
padding:10px;
transition:.2s;
}

.input-box:focus-within{
box-shadow:0 0 30px rgba(76,201,240,.4);
}

/* INPUT */
input{
flex:1;
background:transparent;
border:none;
color:white;
outline:none;
}

/* BUTTON */
button{
border:none;
cursor:pointer;
padding:10px;
border-radius:12px;
transition:.2s;
}

.send{background:var(--primary)}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px rgba(255,255,255,.3);
}

/* PREVIEW */
.preview{
position:fixed;
bottom:110px;
left:50%;
transform:translateX(-50%);
display:none;
background:#000;
padding:10px;
border-radius:12px;
}

/* LOADER */
.loader{
display:none;
text-align:center;
color:#aaa;
}

/* VOICE GLOW */
.recording{
box-shadow:0 0 20px red !important;
}
</style>
</head>

<body>

<div class="sidebar">
<div class="logo">AI Ultra</div>

<div class="menu">
<a>💬 Chat</a>
<a>💎 Upgrade</a>
<a href="/logout">🚪 Logout</a>
</div>

<div style="font-size:12px;color:#64748b;">
{{ user.plan }} • {{ user.messages }}
</div>
</div>

<div class="main">
<div class="chat" id="chat"></div>
<div class="loader" id="loader">AI sta pensando...</div>

<div class="input-wrapper">
<div class="input-box">
<input id="input" placeholder="Scrivi..." autocomplete="off">
<input type="file" id="file" hidden>

<button onclick="file.click()">📷</button>
<button id="micBtn" onclick="toggleMic()">🎤</button>
<button class="send" onclick="send()">➤</button>
</div>
</div>
</div>

<div class="preview" id="preview">
<img id="previewImg" height="60">
<button onclick="removeImage()">✖</button>
</div>

<script>
let selectedImage=null;

/* MESSAGE */
function add(role,text){
let div=document.createElement("div");
div.className="msg "+role;
div.innerHTML=`<div class="bubble"></div>`;
chat.appendChild(div);

type(div.querySelector(".bubble"),text);
}

/* TYPING */
function type(el,text){
let i=0;
function t(){
if(i<text.length){
el.innerHTML+=text[i++];
setTimeout(t,10);
}
}
t();
}

/* SEND */
async function send(){
let text=input.value.trim();
if(!text && !selectedImage) return;

add("user",text);

let form=new FormData();
form.append("prompt",text);
if(selectedImage) form.append("image",selectedImage);

input.value="";
loader.style.display="block";

let res=await fetch("/chat",{method:"POST",body:form});
let data=await res.json();

loader.style.display="none";

add("bot",data.response);
}

/* ENTER */
input.addEventListener("keypress",e=>{
if(e.key==="Enter") send();
});

/* IMAGE */
file.onchange=()=>{
selectedImage=file.files[0];
preview.style.display="block";
previewImg.src=URL.createObjectURL(selectedImage);
};

function removeImage(){
selectedImage=null;
preview.style.display="none";
}

/* VOICE */
let rec;
let recording=false;

function toggleMic(){

if(!('webkitSpeechRecognition' in window)){
alert("Usa Chrome");
return;
}

if(!recording){
rec=new webkitSpeechRecognition();
rec.lang="it-IT";

rec.onstart=()=>{
recording=true;
micBtn.classList.add("recording");
};

rec.onresult=e=>{
input.value=e.results[0][0].transcript;
};

rec.onend=()=>{
recording=false;
micBtn.classList.remove("recording");
};

rec.start();
}else{
rec.stop();
}
}
</script>

</body>
</html>
