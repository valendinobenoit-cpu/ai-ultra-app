<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>AI Ultra Elite</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600&display=swap" rel="stylesheet">

<style>

:root{
--primary:#4cc9f0;
--bg1:#020617;
--bg2:#0f172a;
--glass:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.1);
}

body{
font-family:"Inter";
margin:0;
color:white;
overflow:hidden;
background:linear-gradient(-45deg,#020617,#0f172a,#020617,#1e293b);
background-size:400% 400%;
animation:bg 15s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* SIDEBAR */

.sidebar{
width:260px;
height:100vh;
position:fixed;
background:rgba(255,255,255,0.04);
backdrop-filter:blur(25px);
border-right:1px solid var(--border);
padding:25px;
box-sizing:border-box;
}

.logo{
font-size:24px;
font-weight:700;
color:var(--primary);
margin-bottom:30px;
text-shadow:0 0 20px rgba(76,201,240,.8);
}

.menu a{
display:block;
padding:14px;
margin-bottom:10px;
border-radius:12px;
color:#94a3b8;
text-decoration:none;
transition:.25s;
}

.menu a:hover{
background:rgba(255,255,255,0.05);
color:white;
transform:translateX(5px);
}

/* MAIN */

.main{
margin-left:260px;
height:100vh;
display:flex;
flex-direction:column;
}

/* CHAT */

.chat{
flex:1;
overflow-y:auto;
padding:30px 20px 160px;
width:100%;
max-width:900px;
margin:auto;
box-sizing:border-box;
}

/* MESSAGE */

.msg{
display:flex;
margin-bottom:20px;
animation:fade .25s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
}

.bubble{
padding:14px;
border-radius:18px;
max-width:75%;
line-height:1.6;
white-space:pre-wrap;
word-wrap:break-word;
}

/* USER */

.user{
justify-content:flex-end;
}

.user .bubble{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
box-shadow:0 0 20px rgba(37,99,235,.4);
}

/* BOT */

.bot .bubble{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
}

/* AI IMAGE */

.ai-image{
width:100%;
max-width:350px;
border-radius:14px;
margin-top:10px;
display:block;
}

/* AI VIDEO */

.ai-video{
width:100%;
max-width:400px;
border-radius:14px;
margin-top:10px;
}

/* INPUT */

.input-wrapper{
position:fixed;
bottom:0;
left:260px;
width:calc(100% - 260px);
padding:20px;
background:linear-gradient(to top,#020617,transparent);
box-sizing:border-box;
}

.input-box{
max-width:900px;
margin:auto;
display:flex;
gap:10px;
padding:12px;
border-radius:25px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
}

.input-box:focus-within{
box-shadow:0 0 30px rgba(76,201,240,.3);
}

input{
flex:1;
background:transparent;
border:none;
outline:none;
color:white;
font-size:15px;
}

/* BUTTONS */

button{
border:none;
cursor:pointer;
padding:10px 14px;
border-radius:12px;
background:#1e293b;
color:white;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

.send{
background:var(--primary);
color:black;
font-weight:bold;
}

/* LOADER */

.loader{
display:none;
text-align:center;
padding:10px;
color:#94a3b8;
}

/* PREVIEW */

.preview{
position:fixed;
bottom:110px;
left:50%;
transform:translateX(-50%);
background:#000;
padding:10px;
border-radius:14px;
display:none;
z-index:999;
}

.preview img{
border-radius:10px;
}

/* VOICE */

.recording{
box-shadow:0 0 20px red !important;
}

/* AI SPEAKING */

.speaking{
animation:pulse 1s infinite;
}

@keyframes pulse{
0%{
box-shadow:0 0 10px rgba(76,201,240,.2);
}
50%{
box-shadow:0 0 30px rgba(76,201,240,.8);
}
100%{
box-shadow:0 0 10px rgba(76,201,240,.2);
}
}

</style>
</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
AI Ultra
</div>

<div class="menu">

<a href="#">💬 Chat</a>
<a href="#">🖼️ AI Images</a>
<a href="#">🎬 AI Video</a>
<a href="#">🎤 Voice AI</a>
<a href="#">💎 Upgrade</a>
<a href="/logout">🚪 Logout</a>

</div>

<div style="margin-top:20px;font-size:12px;color:#64748b;">

{{ user.plan }} • {{ user.messages }}

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="chat" id="chat"></div>

<!-- 🔥 AUDIO AI -->
<audio id="aiAudio"></audio>

<div class="loader" id="loader">
AI sta pensando...
</div>

<div class="input-wrapper">

<div class="input-box" id="inputBox">

<input
id="input"
placeholder="Scrivi qualcosa..."
autocomplete="off"
>

<input type="file" id="file" hidden>

<button onclick="document.getElementById('file').click()">
📷
</button>

<button id="micBtn" onclick="toggleMic()">
🎤
</button>

<button class="send" onclick="send()">
➤
</button>

</div>

</div>

</div>

<!-- PREVIEW -->

<div class="preview" id="preview">

<img id="previewImg" height="60">

<button onclick="removeImage()">
✖
</button>

</div>

<script>

let selectedImage = null;

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const loader = document.getElementById("loader");
const file = document.getElementById("file");
const preview = document.getElementById("preview");
const previewImg = document.getElementById("previewImg");
const micBtn = document.getElementById("micBtn");
const aiAudio = document.getElementById("aiAudio");
const inputBox = document.getElementById("inputBox");

/* ---------------- ADD MESSAGE ---------------- */

function add(role, text, isImage=false, isVideo=false){

let div = document.createElement("div");

div.className = "msg " + role;

/* 🔥 IMMAGINE */

if(isImage){

div.innerHTML = `
<div class="bubble">
<img src="${text}" class="ai-image">
</div>
`;

}

/* 🎬 VIDEO */

else if(isVideo){

div.innerHTML = `
<div class="bubble">
<video controls class="ai-video">
<source src="${text}">
</video>
</div>
`;

}

/* 💬 TESTO */

else{

div.innerHTML = `
<div class="bubble"></div>
`;

}

chat.appendChild(div);

/* TYPE EFFECT */

if(!isImage && !isVideo){

typeEffect(
div.querySelector(".bubble"),
text
);

}

scrollBottom();

}

/* ---------------- TYPE EFFECT ---------------- */

function typeEffect(el,text){

let i = 0;

function write(){

if(i < text.length){

el.innerHTML += text.charAt(i);

i++;

scrollBottom();

setTimeout(write,10);

}

}

write();

}

/* ---------------- SCROLL ---------------- */

function scrollBottom(){

chat.scrollTop = chat.scrollHeight;

}

/* ---------------- AI VOICE ---------------- */

async function playVoice(text){

try{

inputBox.classList.add("speaking");

let voiceForm = new FormData();

voiceForm.append("text", text);

let voiceRes = await fetch("/voice-chat",{
method:"POST",
body:voiceForm
});

let blob = await voiceRes.blob();

let audioUrl = URL.createObjectURL(blob);

aiAudio.src = audioUrl;

await aiAudio.play();

aiAudio.onended = ()=>{

inputBox.classList.remove("speaking");

};

}catch(e){

console.log("Errore audio:", e);

inputBox.classList.remove("speaking");

}

}

/* ---------------- SEND ---------------- */

async function send(){

let text = input.value.trim();

if(!text && !selectedImage){
return;
}

/* USER MSG */

add("user",text);

let form = new FormData();

form.append("prompt",text);

if(selectedImage){

form.append("image",selectedImage);

}

/* RESET */

input.value = "";

loader.style.display = "block";

try{

let res = await fetch("/chat",{
method:"POST",
body:form
});

let data = await res.json();

loader.style.display = "none";

/* 🔥 IMMAGINE */

if(data.image){

add("bot",data.image,true,false);

}

/* 🎬 VIDEO */

else if(data.video){

add("bot",data.video,false,true);

}

/* 💬 TESTO */

else{

add("bot",data.response);

/* 🔥 VOCE AUTOMATICA */

playVoice(data.response);

}

}catch(e){

loader.style.display = "none";

add("bot","⚠️ Errore server");

console.log(e);

}

removeImage();

}

/* ---------------- ENTER ---------------- */

input.addEventListener("keypress",e=>{

if(e.key === "Enter"){
send();
}

});

/* ---------------- IMAGE PREVIEW ---------------- */

file.onchange = ()=>{

selectedImage = file.files[0];

preview.style.display = "block";

previewImg.src = URL.createObjectURL(selectedImage);

};

function removeImage(){

selectedImage = null;

preview.style.display = "none";

}

/* ---------------- VOICE ---------------- */

let rec;
let recording = false;

function toggleMic(){

if(!("webkitSpeechRecognition" in window)){

alert("Usa Google Chrome");

return;

}

if(!recording){

rec = new webkitSpeechRecognition();

rec.lang = "it-IT";

rec.onstart = ()=>{

recording = true;

micBtn.classList.add("recording");

};

rec.onresult = e=>{

input.value = e.results[0][0].transcript;

};

rec.onend = ()=>{

recording = false;

micBtn.classList.remove("recording");

};

rec.start();

}else{

rec.stop();

}

}

</script>

</body>
</html>
