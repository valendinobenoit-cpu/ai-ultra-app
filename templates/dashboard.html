<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Ultra Elite</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
--primary:#4cc9f0;
--bg1:#020617;
--bg2:#0f172a;
--glass:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.08);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Inter";
height:100vh;
overflow:hidden;
color:white;
background:linear-gradient(-45deg,#020617,#0f172a,#020617,#1e293b);
background-size:400% 400%;
animation:bg 15s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* SIDEBAR */

.sidebar{
position:fixed;
left:0;
top:0;
width:260px;
height:100vh;
padding:25px;
background:rgba(255,255,255,0.04);
backdrop-filter:blur(25px);
border-right:1px solid var(--border);
z-index:10;
}

.logo{
font-size:24px;
font-weight:700;
color:var(--primary);
margin-bottom:35px;
text-shadow:0 0 20px rgba(76,201,240,.8);
}

.menu a{
display:block;
padding:14px;
margin-bottom:10px;
border-radius:14px;
text-decoration:none;
color:#94a3b8;
transition:.25s;
}

.menu a:hover{
background:rgba(255,255,255,.05);
color:white;
transform:translateX(5px);
}

/* MAIN */

.main{
margin-left:260px;
height:100vh;
display:flex;
flex-direction:column;
position:relative;
}

/* AI ORB */

.ai-orb{
position:fixed;
top:30px;
right:30px;
width:120px;
height:120px;
border-radius:50%;
background:
radial-gradient(circle at 30% 30%, #4cc9f0, #0ea5e9, #020617);
box-shadow:
0 0 40px #4cc9f0,
0 0 80px #0ea5e9;
animation:float 4s ease-in-out infinite;
z-index:999;
transition:.3s;
}

@keyframes float{
0%{
transform:translateY(0px) scale(1);
}
50%{
transform:translateY(-10px) scale(1.03);
}
100%{
transform:translateY(0px) scale(1);
}
}

/* CHAT */

.chat{
flex:1;
overflow-y:auto;
padding:30px 20px 160px;
max-width:950px;
width:100%;
margin:auto;
}

/* MESSAGE */

.msg{
display:flex;
margin-bottom:20px;
animation:fade .25s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
}

.user{
justify-content:flex-end;
}

.bubble{
padding:14px;
border-radius:18px;
line-height:1.6;
max-width:75%;
white-space:pre-wrap;
word-wrap:break-word;
position:relative;
}

/* USER */

.user .bubble{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
box-shadow:0 0 20px rgba(37,99,235,.4);
}

/* BOT */

.bot .bubble{
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(10px);
}

/* TYPING EFFECT */

.typing::after{
content:"|";
animation:blink 1s infinite;
}

@keyframes blink{
50%{
opacity:0;
}
}

/* IMMAGINI */

.ai-image{
width:100%;
max-width:350px;
border-radius:16px;
margin-top:10px;
display:block;
box-shadow:0 0 25px rgba(0,0,0,.4);
}

/* VIDEO */

.ai-video{
width:100%;
max-width:450px;
border-radius:16px;
margin-top:10px;
}

/* INPUT */

.input-wrapper{
position:fixed;
bottom:0;
left:260px;
width:calc(100% - 260px);
padding:20px;
background:linear-gradient(to top,#020617,transparent);
z-index:5;
}

.input-box{
max-width:950px;
margin:auto;
display:flex;
gap:10px;
padding:12px;
border-radius:25px;
background:rgba(255,255,255,.05);
border:1px solid rgba(255,255,255,.08);
backdrop-filter:blur(20px);
}

.input-box:focus-within{
box-shadow:0 0 30px rgba(76,201,240,.3);
}

input{
flex:1;
background:transparent;
border:none;
outline:none;
color:white;
font-size:15px;
}

/* BUTTONS */

button{
border:none;
cursor:pointer;
padding:10px 14px;
border-radius:12px;
background:#1e293b;
color:white;
transition:.2s;
font-size:15px;
}

button:hover{
transform:scale(1.05);
}

.send{
background:var(--primary);
color:black;
font-weight:bold;
}

/* LOADER */

.loader{
display:none;
text-align:center;
padding:10px;
color:#94a3b8;
}

/* PREVIEW */

.preview{
position:fixed;
bottom:110px;
left:50%;
transform:translateX(-50%);
background:#000;
padding:10px;
border-radius:14px;
display:none;
z-index:999;
}

.preview img{
border-radius:10px;
}

/* VOICE */

.recording{
box-shadow:0 0 25px red !important;
}

/* USER INFO */

.user-info{
margin-top:20px;
font-size:12px;
color:#64748b;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">
AI Ultra
</div>

<div class="menu">

<a href="#">💬 Chat</a>
<a href="#">🖼️ AI Images</a>
<a href="#">🧠 Smart Memory</a>
<a href="#">🎤 Voice AI</a>
<a href="#">💎 Upgrade</a>
<a href="/logout">🚪 Logout</a>

</div>

<div class="user-info">
{{ user.plan }} • {{ user.messages }}
</div>

</div>

<!-- MAIN -->

<div class="main">

<!-- AI ORB -->

<div class="ai-orb"></div>

<!-- CHAT -->

<div class="chat" id="chat"></div>

<!-- LOADER -->

<div class="loader" id="loader">
AI sta pensando...
</div>

<!-- INPUT -->

<div class="input-wrapper">

<div class="input-box">

<input
id="input"
placeholder="Scrivi qualcosa..."
autocomplete="off"
>

<input type="file" id="file" hidden>

<button onclick="document.getElementById('file').click()">
📷
</button>

<button id="micBtn" onclick="toggleMic()">
🎤
</button>

<button class="send" onclick="send()">
➤
</button>

</div>

</div>

</div>

<!-- PREVIEW -->

<div class="preview" id="preview">

<img id="previewImg" height="60">

<button onclick="removeImage()">
✖
</button>

</div>

<script>

let selectedImage = null;

const chat = document.getElementById("chat");
const input = document.getElementById("input");
const loader = document.getElementById("loader");
const file = document.getElementById("file");
const preview = document.getElementById("preview");
const previewImg = document.getElementById("previewImg");
const micBtn = document.getElementById("micBtn");
const orb = document.querySelector(".ai-orb");

/* ---------------- ADD MESSAGE ---------------- */

function add(role,text,isImage=false,isVideo=false){

let div = document.createElement("div");

div.className = "msg " + role;

/* IMMAGINE */

if(isImage){

div.innerHTML = `
<div class="bubble">
<img src="${text}" class="ai-image">
</div>
`;

}

/* VIDEO */

else if(isVideo){

div.innerHTML = `
<div class="bubble">
<video controls class="ai-video">
<source src="${text}">
</video>
</div>
`;

}

/* TESTO */

else{

div.innerHTML = `
<div class="bubble typing"></div>
`;

}

chat.appendChild(div);

/* TYPE EFFECT */

if(!isImage && !isVideo){

typeEffect(
div.querySelector(".bubble"),
text
);

}

scrollBottom();

}

/* ---------------- TYPE EFFECT ---------------- */

function typeEffect(el,text){

let i = 0;

function write(){

if(i < text.length){

el.innerHTML += text.charAt(i);

i++;

scrollBottom();

setTimeout(write,5);

}else{

el.classList.remove("typing");

}

}

write();

}

/* ---------------- SCROLL ---------------- */

function scrollBottom(){

chat.scrollTop = chat.scrollHeight;

}

/* ---------------- SEND ---------------- */

async function send(){

let text = input.value.trim();

if(!text && !selectedImage){
return;
}

/* USER MESSAGE */

add("user",text);

let form = new FormData();

form.append("prompt",text);

if(selectedImage){

form.append("image",selectedImage);

}

/* RESET */

input.value = "";

loader.style.display = "block";

/* ORB REACTION */

orb.style.transform = "scale(1.2)";
orb.style.boxShadow = `
0 0 60px #4cc9f0,
0 0 120px #0ea5e9
`;

try{

let res = await fetch("/chat",{
method:"POST",
body:form
});

let data = await res.json();

loader.style.display = "none";

/* ORB NORMAL */

orb.style.transform = "scale(1)";
orb.style.boxShadow = `
0 0 40px #4cc9f0,
0 0 80px #0ea5e9
`;

/* IMMAGINE */

if(data.image){

add("bot",data.image,true,false);

}

/* VIDEO */

else if(data.video){

add("bot",data.video,false,true);

}

/* TESTO */

else{

add("bot",data.response);

speak(data.response);

}

}catch(e){

loader.style.display = "none";

add("bot","⚠️ Errore server");

console.log(e);

}

/* RESET IMAGE */

removeImage();

}

/* ---------------- TEXT TO SPEECH ---------------- */

function speak(text){

window.speechSynthesis.cancel();

const speech = new SpeechSynthesisUtterance(text);

speech.lang = "it-IT";

speech.rate = 1;

speech.pitch = 1;

speech.volume = 1;

window.speechSynthesis.speak(speech);

}

/* ---------------- ENTER ---------------- */

input.addEventListener("keypress",e=>{

if(e.key === "Enter"){
send();
}

});

/* ---------------- IMAGE PREVIEW ---------------- */

file.onchange = ()=>{

selectedImage = file.files[0];

preview.style.display = "block";

previewImg.src = URL.createObjectURL(selectedImage);

};

function removeImage(){

selectedImage = null;

preview.style.display = "none";

}

/* ---------------- VOICE AI ---------------- */

let rec;
let recording = false;

function toggleMic(){

if(!("webkitSpeechRecognition" in window)){

alert("Usa Google Chrome");

return;

}

/* START */

if(!recording){

recording = true;

rec = new webkitSpeechRecognition();

rec.lang = "it-IT";

rec.continuous = true;

rec.interimResults = false;

micBtn.classList.add("recording");

rec.onresult = async e=>{

let transcript = e.results[e.results.length - 1][0].transcript;

input.value = transcript;

await send();

};

rec.onend = ()=>{

if(recording){

rec.start();

}else{

micBtn.classList.remove("recording");

}

};

rec.start();

}

/* STOP */

else{

recording = false;

rec.stop();

micBtn.classList.remove("recording");

}

}

</script>
<script src="/static/futura.js"></script>
</body>
</html>
