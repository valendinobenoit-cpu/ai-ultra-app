<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Ultra Elite</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;600&display=swap" rel="stylesheet">

<style>
:root{
--primary:#4cc9f0;
--bg1:#020617;
--bg2:#0f172a;
--glass:rgba(255,255,255,0.05);
--border:rgba(255,255,255,0.1);
}

body{
font-family:"Inter";
margin:0;
color:white;
background:linear-gradient(-45deg,#020617,#0f172a,#020617,#1e293b);
background-size:400% 400%;
animation:bg 15s ease infinite;
}

@keyframes bg{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* LAYOUT */
.container{
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:260px;
background:var(--glass);
backdrop-filter:blur(25px);
border-right:1px solid var(--border);
padding:20px;
transition:.3s;
}

.logo{
color:var(--primary);
font-size:20px;
margin-bottom:20px;
}

.menu a{
display:block;
padding:10px;
border-radius:10px;
color:#94a3b8;
margin-bottom:6px;
text-decoration:none;
}

.menu a:hover{
color:white;
background:rgba(255,255,255,0.1);
}

/* MAIN */
.main{
flex:1;
display:flex;
flex-direction:column;
}

/* CHAT */
.chat{
flex:1;
overflow-y:auto;
padding:20px;
max-width:900px;
margin:auto;
width:100%;
}

/* MSG */
.msg{
display:flex;
margin-bottom:15px;
}

.bubble{
padding:12px;
border-radius:14px;
max-width:75%;
line-height:1.5;
}

/* USER */
.user .bubble{
margin-left:auto;
background:#2563eb;
}

/* BOT */
.bot .bubble{
background:var(--glass);
border:1px solid var(--border);
}

/* INPUT */
.input-wrapper{
position:sticky;
bottom:0;
padding:15px;
background:linear-gradient(to top,#020617,transparent);
}

.input-box{
display:flex;
gap:8px;
background:var(--glass);
border:1px solid var(--border);
border-radius:25px;
padding:8px;
}

input{
flex:1;
background:transparent;
border:none;
color:white;
outline:none;
padding:10px;
}

/* BUTTON */
button{
border:none;
cursor:pointer;
padding:10px;
border-radius:10px;
background:transparent;
color:white;
}

.send{
background:var(--primary);
color:black;
}

/* MOBILE */
@media(max-width:768px){

.sidebar{
position:fixed;
left:-260px;
top:0;
height:100%;
z-index:100;
}

.sidebar.open{
left:0;
}

.main{
margin-left:0;
}

.menu-toggle{
display:block;
position:fixed;
top:10px;
left:10px;
background:var(--primary);
color:black;
padding:10px;
border-radius:10px;
z-index:200;
}

}

@media(min-width:769px){
.menu-toggle{
display:none;
}
}

.recording{
box-shadow:0 0 15px red;
}
</style>
</head>

<body>

<button class="menu-toggle" onclick="toggleMenu()">☰</button>

<div class="container">

<div class="sidebar" id="sidebar">
<div class="logo">AI Ultra</div>

<div class="menu">
<a>💬 Chat</a>
<a>💎 Upgrade</a>
<a href="/logout">🚪 Logout</a>
</div>

<div style="font-size:12px;color:#64748b;">
{{ user.plan }} • {{ user.messages }}
</div>
</div>

<div class="main">

<div class="chat" id="chat"></div>

<div class="input-wrapper">
<div class="input-box">

<input id="input" placeholder="Scrivi..." autocomplete="off">

<input type="file" id="file" hidden>

<button onclick="file.click()">📷</button>
<button id="micBtn" onclick="toggleMic()">🎤</button>
<button class="send" onclick="send()">➤</button>

</div>
</div>

</div>
</div>

<script>
let selectedImage=null;

/* MENU MOBILE */
function toggleMenu(){
sidebar.classList.toggle("open");
}

/* MESSAGE */
function add(role,text){
let div=document.createElement("div");
div.className="msg "+role;
div.innerHTML=`<div class="bubble"></div>`;
chat.appendChild(div);
type(div.querySelector(".bubble"),text);
chat.scrollTop=chat.scrollHeight;
}

/* TYPING */
function type(el,text){
let i=0;
function t(){
if(i<text.length){
el.innerHTML+=text[i++];
setTimeout(t,10);
}
}
t();
}

/* SEND */
async function send(){
let text=input.value.trim();
if(!text && !selectedImage) return;

add("user",text);

let form=new FormData();
form.append("prompt",text);
if(selectedImage) form.append("image",selectedImage);

input.value="";

let res=await fetch("/chat",{method:"POST",body:form});
let data=await res.json();

add("bot",data.response);
}

/* ENTER */
input.addEventListener("keypress",e=>{
if(e.key==="Enter") send();
});

/* IMAGE */
file.onchange=()=>{
selectedImage=file.files[0];
};

/* VOICE */
let rec;
let recording=false;

function toggleMic(){

if(!('webkitSpeechRecognition' in window)){
alert("Usa Chrome");
return;
}

if(!recording){
rec=new webkitSpeechRecognition();
rec.lang="it-IT";

rec.onstart=()=>{
recording=true;
micBtn.classList.add("recording");
};

rec.onresult=e=>{
input.value=e.results[0][0].transcript;
};

rec.onend=()=>{
recording=false;
micBtn.classList.remove("recording");
};

rec.start();
}else{
rec.stop();
}
}
</script>

</body>
</html>
